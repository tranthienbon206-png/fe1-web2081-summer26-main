<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Thêm sản phẩm</h4>
                </div>

                <div class="card-body">

                    <form [formGroup]="addForm" (ngSubmit)="onSubmit()">

                        <div class="mb-3">
                            <label class="form-label">Tên sản phẩm</label>

                            <input type="text" class="form-control" formControlName="name">

                            @if(name?.invalid && name?.touched){
                            <div class="text-danger mt-1">
                                Tên sản phẩm không được để trống
                            </div>
                            }
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá</label>

                            <input type="number" class="form-control" formControlName="price">

                            @if(price?.invalid && price?.touched){
                            <div class="text-danger mt-1">
                                Giá phải lớn hơn 0
                            </div>
                            }
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Danh mục</label>

                            <input type="text" class="form-control" formControlName="category">

                            @if(category?.invalid && category?.touched){
                            <div class="text-danger mt-1">
                                Danh mục không được để trống
                            </div>
                            }
                        </div>

                        <button class="btn btn-primary w-100" [disabled]="addForm.invalid">
                            Thêm sản phẩm
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
